<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELIA WORLD SIM - V.2.0</title>
    <style>
        /* --- LE LOOK (CSS) --- */
        body { margin: 0; background: #001a33; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #game-container { display: flex; width: 100vw; height: 100vh; }
        
        #sidebar-left, #sidebar-right { width: 220px; background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #444; z-index: 10; }
        
        #viewport { flex-grow: 1; position: relative; overflow: hidden; background: radial-gradient(circle, #004d7a 0%, #001a33 100%); }
        
        /* Effet 2.5D Isométrique */
        #world-map { 
            position: absolute; 
            top: 20%; left: 20%;
            display: grid; 
            transform: rotateX(55deg) rotateZ(-45deg); 
            transform-style: preserve-3d; 
            transition: transform 0.3s;
        }

        .tile { width: 35px; height: 35px; border: 0.1px solid rgba(255,255,255,0.05); }
        .grass { background: #2ecc71; }
        .water { background: #3498db; opacity: 0.8; }
        .mountain { background: #95a5a6; box-shadow: -2px 2px 5px rgba(0,0,0,0.5); transform: translateZ(5px); }

        /* Les petits bonhommes */
        .unit { 
            position: absolute; width: 8px; height: 8px; background: #f1c40f; 
            border-radius: 50%; box-shadow: 0 0 8px #f1c40f; 
            z-index: 100; transition: all 1s ease-in-out;
        }

        #stats-panel { background: #111; padding: 10px; border: 2px solid #f1c40f; border-radius: 8px; margin-bottom: 20px; }
        .stat-line { font-size: 18px; margin: 5px 0; font-weight: bold; }
        
        #logs { font-size: 12px; color: #aaa; height: 200px; overflow-y: hidden; }
        .log-entry { border-bottom: 1px solid #333; padding: 3px 0; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="sidebar-left">
            <h3>🌍 EMPIRES</h3>
            <button style="width:100%; margin-bottom:5px;">Afrique</button>
            <button style="width:100%; margin-bottom:5px;">Europe</button>
            <button style="width:100%; margin-bottom:5px;">Asie</button>
        </div>

        <div id="viewport">
            <div id="world-map"></div>
        </div>

        <div id="sidebar-right">
            <div id="stats-panel">
                <div class="stat-line">🏠 Pop: <span id="pop-count">10</span></div>
                <div class="stat-line">🪵 Bois: <span id="wood-count">0</span></div>
                <div class="stat-line">💎 Cristal: <span id="crystal-count">0</span></div>
            </div>
            <h4>📜 HISTORIQUE</h4>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        /* --- LE CERVEAU (JS) --- */
        const mapElement = document.getElementById('world-map');
        const mapSize = 25; 
        let resources = { wood: 0, crystal: 0, pop: 10 };

        // Génération de la carte
        function initMap() {
            mapElement.style.gridTemplateColumns = `repeat(${mapSize}, 35px)`;
            for (let i = 0; i < mapSize * mapSize; i++) {
                const tile = document.createElement('div');
                let type = 'grass';
                let rand = Math.random();
                if (rand > 0.8) type = 'water';
                else if (rand > 0.92) type = 'mountain';
                tile.className = 'tile ' + type;
                mapElement.appendChild(tile);
            }
        }

        // Créer un bonhomme
        function spawnUnit() {
            const unit = document.createElement('div');
            unit.className = 'unit';
            unit.style.left = "50%";
            unit.style.top = "50%";
            document.getElementById('viewport').appendChild(unit);
            
            // Intelligence artificielle simple : bouger et récolter
            setInterval(() => {
                let x = Math.random() * 80 + 10;
                let y = Math.random() * 80 + 10;
                unit.style.left = x + "%";
                unit.style.top = y + "%";
                
                // Récolte automatique
                resources.wood += Math.floor(Math.random() * 5);
                resources.pop += Math.random() > 0.9 ? 1 : 0;
                updateUI();
            }, 3000);
        }

        function updateUI() {
            document.getElementById('wood-count').innerText = resources.wood;
            document.getElementById('pop-count').innerText = Math.floor(resources.pop);
        }

        function addLog(msg) {
            const logBox = document.getElementById('logs');
            logBox.innerHTML = `<div class="log-entry">> ${msg}</div>` + logBox.innerHTML;
        }

        // Lancement
        initMap();
        for(let i=0; i<6; i++) {
            setTimeout(spawnUnit, i * 500);
        }
        addLog("Civilisation détectée...");
        addLog("Déploiement des unités de récolte.");
    </script>
</body>
</html>
